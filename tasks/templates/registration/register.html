{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-success text-white text-center py-3">
                <h4 class="mb-0"><i class="fas fa-user-plus"></i> Inscription TaskMaster</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    
                    {% for field in form %}
                    <div class="mb-3">
                        <label for="{{ field.id_for_label }}" class="form-label fw-bold">{{ field.label }}</label>
                        {{ field.errors }}
                        
                        <div class="form-control-wrapper">
                            {{ field }}
                        </div>
                        
                        {% if field.help_text %}
                        <div class="form-text text-muted small mt-1">{{ field.help_text|safe }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-success btn-lg">Créer mon compte</button>
                    </div>
                </form>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <p class="mb-0">Vous avez déjà un compte ?</p>
                    <a href="{% url 'login' %}" class="btn btn-outline-primary mt-2">Connectez-vous ici</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Ajout dynamique de la classe form-control
    document.addEventListener("DOMContentLoaded", function () {
        var inputs = document.querySelectorAll('.form-control-wrapper input');
        inputs.forEach(function (input) {
            input.classList.add('form-control');
        });
    });
</script>
{% endblock %}
