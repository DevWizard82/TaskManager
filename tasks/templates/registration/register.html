{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center" style="min-height: calc(100vh - 120px); align-items: center;">
    <div class="col-md-6 col-lg-5">
        <div class="card auth-card shadow-sm">
            <div class="card-header">
                <h4>Créer un compte</h4>
                <p>Inscrivez-vous pour commencer</p>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}

                    {% for field in form %}
                    <div class="mb-3">
                        <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                        <div class="form-control-wrapper">
                            {{ field }}
                        </div>
                        {{ field.errors }}
                        {% if field.help_text %}
                        <div class="form-text mt-1">{{ field.help_text|safe }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-success btn-lg">Créer mon compte</button>
                    </div>
                </form>
            </div>
            <div class="card-footer">
                Déjà inscrit ? <a href="{% url 'login' %}">Connectez-vous</a>
            </div>
        </div>
    </div>
</div>

<script>
    // Ajout dynamique de la classe form-control
    document.addEventListener("DOMContentLoaded", function () {
        var inputs = document.querySelectorAll('.form-control-wrapper input');
        inputs.forEach(function (input) {
            input.classList.add('form-control');
        });
    });
</script>
{% endblock %}
