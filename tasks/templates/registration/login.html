{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0"><i class="fas fa-lock"></i> Connexion TaskMaster</h4>
            </div>
            <div class="card-body p-4">
                {% if form.errors %}
                <div class="alert alert-danger">
                    Nom d'utilisateur ou mot de passe incorrect. Veuillez réessayer.
                </div>
                {% endif %}

                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Nom d'utilisateur</label>
                        <input type="text" name="username" autofocus autocapitalize="none" autocomplete="username" maxlength="150" class="form-control" required id="id_username">
                    </div>
                    
                    <div class="mb-4">
                        <label for="id_password" class="form-label">Mot de passe</label>
                        <input type="password" name="password" autocomplete="current-password" class="form-control" required id="id_password">
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Se connecter</button>
                    </div>
                    <input type="hidden" name="next" value="{{ next }}">
                </form>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <p class="mb-0">Pas encore de compte ?</p>
                    <a href="{% url 'register' %}" class="btn btn-outline-success mt-2">Créez-en un ici</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
