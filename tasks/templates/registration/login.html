{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center" style="min-height: calc(100vh - 120px); align-items: center;">
    <div class="col-md-5 col-lg-4">
        <div class="card auth-card shadow-sm">
            <div class="card-header">
                <h4>Connexion</h4>
                <p>Ravi de vous revoir</p>
            </div>
            <div class="card-body p-4">
                {% if form.errors %}
                <div class="alert alert-danger">
                    Identifiants incorrects. Réessayez.
                </div>
                {% endif %}

                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="id_username" class="form-label">Nom d'utilisateur</label>
                        <input type="text" name="username" id="id_username" class="form-control" autofocus autocomplete="username" required placeholder="votre.nom">
                    </div>

                    <div class="mb-3">
                        <label for="id_password" class="form-label">Mot de passe</label>
                        <input type="password" name="password" id="id_password" class="form-control" autocomplete="current-password" required placeholder="••••••••">
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Se connecter</button>
                    </div>
                    <input type="hidden" name="next" value="{{ next }}">
                </form>
            </div>
            <div class="card-footer">
                Pas de compte ? <a href="{% url 'register' %}">Créez-en un</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
