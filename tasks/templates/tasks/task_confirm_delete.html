{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center" style="min-height: calc(100vh - 160px); align-items: center;">
    <div class="col-md-6 col-lg-5">
        <div class="text-center">
            <div class="confirm-icon mx-auto mb-3">
                <i class="fas fa-trash-alt"></i>
            </div>
            <h4 class="fw-bold mb-2">Supprimer cette tâche ?</h4>
            <p class="text-muted">Cette action est définitive et ne peut pas être annulée.</p>

            <div class="confirm-task-name my-3">{{ task.titre }}</div>

            <form method="POST" class="mt-4">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-2">
                    <a href="{% url 'task_list' %}" class="btn btn-outline-secondary">Annuler</a>
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-trash"></i> Supprimer
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
