{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card border-danger shadow">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0"><i class="fas fa-exclamation-triangle"></i> Confirmation de suppression</h4>
            </div>
            <div class="card-body text-center">
                <p class="lead">Êtes-vous sûr de vouloir supprimer la tâche suivante ?</p>
                <h5 class="fw-bold my-4">"{{ task.titre }}"</h5>
                <p class="text-muted small">Cette action est irréversible.</p>
                
                <form method="POST" class="mt-4">
                    {% csrf_token %}
                    <a href="{% url 'task_list' %}" class="btn btn-secondary me-2">Annuler</a>
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-trash-alt"></i> Oui, supprimer
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
